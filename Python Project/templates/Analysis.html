<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <title>AquaSence</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='styles.css') }}"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="main">
      <!-- Navbar -->
      <div class="navbar">
        <div class="logo">
          <i class="fa-solid fa-book-atlas" color="Red" padding-top="5rem" height="10px" width="10px"> AquaSence</i>
        </div>
        <div class="links">
          <a href="/" class="{{ 'active' if request.path == '/' else '' }}"
            >Home</a
          >
          <a
            href="/maps"
            class="{{ 'active' if request.path == '/maps' else '' }}"
            >Maps</a
          >
          <a
            href="/analysis"
            class="{{ 'active' if request.path == '/analysis' else '' }}"
            >Analysis</a
          >
          <a
            href="/research"
            class="{{ 'active' if request.path == '/research' else '' }}"
            >Research</a
          >
          <a
            href="/features"
            class="{{ 'active' if request.path == '/features' else '' }}"
            >Features</a
          >
        </div>
      </div>
      <hr>
      <br><br><br>
      <h1>This is analysis page</h1>
    </div>
  </body>
</html>
